<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />
    <title>Roman Numeral Converter</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <div id="app"></div>
    <h2>Number to Roman Numeral (1-10):</h2>

    <p>Enter a number from (1 to 10):</p>
    <input type="number" id="userinput" placeholder="8" />
    <button onclick="convert()">Convert</button>
    <div id="result"></div>
    <p>The Roma numeral is:<strong id="outputresult"></strong></p>

    <input type="number" id="numinput" />

    <p id="result"></p>

    <script src="index.js"></script>
  </body>
</html>
